services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: opencnapp
      POSTGRES_USER: opencnapp
      POSTGRES_PASSWORD: opencnapp
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./api/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  redis:
    image: redis:7
    ports: ["6379:6379"]
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://opencnapp:opencnapp@postgres:5432/opencnapp
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production
      OPENCNAPP_ADMIN_EMAIL: admin@localhost
      OPENCNAPP_ADMIN_PASSWORD: changeme
      OPENCNAPP_DASHBOARD_URL: http://localhost:3000
      OPENCNAPP_API_PUBLIC_URL: http://localhost:8000
      OIDC_REDIRECT_URI: http://localhost:8000/auth/oidc/callback
      # Optional SSO: set OIDC_ISSUER, OIDC_CLIENT_ID, OIDC_CLIENT_SECRET, OIDC_ADMIN_EMAILS
    ports: ["8000:8000"]
    depends_on: [postgres, redis]
    volumes: ["./:/app", "/var/run/docker.sock:/var/run/docker.sock"]
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: celery -A api.workers.celery_app.celery_app worker -l info
    environment:
      DATABASE_URL: postgresql+psycopg2://opencnapp:opencnapp@postgres:5432/opencnapp
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me
    depends_on: [postgres, redis]
    volumes: ["./:/app", "/var/run/docker.sock:/var/run/docker.sock"]

  dashboard:
    image: node:20
    working_dir: /app/dashboard
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      # Browser calls host-mapped ports (not container hostnames)
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    ports: ["3000:5173"]
    volumes: ["./:/app"]
    depends_on: [api]
    restart: unless-stopped

  falco:
    profiles: ["runtime"]
    image: falcosecurity/falco-no-driver:latest
    privileged: true
    pid: host
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - /proc:/host/proc:ro
      - ./config/falco/falco.yaml:/etc/falco/falco.yaml
    command: ["/usr/bin/falco", "-o", "http_output.enabled=true", "-o", "http_output.url=http://falcosidekick:2801/"]

  falcosidekick:
    profiles: ["runtime"]
    image: falcosecurity/falcosidekick:latest
    environment:
      WEBHOOK_ADDRESS: http://api:8000/webhook/falco
    depends_on: [api]

  bloodhound:
    profiles: ["ciem"]
    image: ghcr.io/specterops/bloodhound:latest
    ports: ["8080:8080"]

  azurehound:
    profiles: ["ciem"]
    image: ghcr.io/bloodhoundad/azurehound:latest
    command: ["--help"]

volumes:
  pgdata:
