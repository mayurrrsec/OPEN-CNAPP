version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: opencnapp
      POSTGRES_USER: opencnapp
      POSTGRES_PASSWORD: opencnapp
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./api/database/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    ports: ["6379:6379"]

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://opencnapp:opencnapp@postgres:5432/opencnapp
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me
    ports: ["8000:8000"]
    depends_on: [postgres, redis]
    volumes: ["./:/app"]

  worker:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: celery -A api.workers.celery_app.celery_app worker -l info
    environment:
      DATABASE_URL: postgresql+psycopg2://opencnapp:opencnapp@postgres:5432/opencnapp
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me
    depends_on: [postgres, redis]
    volumes: ["./:/app"]

  dashboard:
    image: node:20
    working_dir: /app/dashboard
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_API_URL: http://localhost:8000
    ports: ["3000:5173"]
    volumes: ["./:/app"]
    depends_on: [api]

volumes:
  pgdata:
