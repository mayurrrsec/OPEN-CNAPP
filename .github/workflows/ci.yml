name: opencnapp-ci
on:
  pull_request:
  push:
    branches: ["main", "work"]

jobs:
  normalizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m unittest discover -s tests
