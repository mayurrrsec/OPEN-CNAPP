name: kubebench
display_name: kube-bench
domain: kspm
run_mode: container
enabled: true
schedule: "0 */12 * * *"
image: aquasec/kube-bench:latest
normalizer: api.adapters.kubebench.KubebenchAdapter
# JSON on stdout for Celery scanner_runner → ingest (requires OPENCNAPP_KUBECONFIG + mount on worker)
config:
  command: ["--json"]
